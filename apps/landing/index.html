<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <title>Belhssan</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap { text-align: center; max-width: 400px; width: 100%; }
    .logo { font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .sub { color: #444; font-size: 13px; margin-bottom: 40px; letter-spacing: 0.5px; }
    .tools { display: flex; flex-direction: column; gap: 12px; }
    .tool {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #111;
      border: 1px solid #1e1e1e;
      color: #fff;
      padding: 18px 20px;
      border-radius: 14px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }
    .tool:hover { border-color: #333; background: #141414; }
    .tool-icon { font-size: 24px; flex-shrink: 0; }
    .tool-name { font-size: 15px; font-weight: 700; }
    .tool-desc { font-size: 12px; color: #555; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Belhssan</div>
    <div class="sub">Personal tools</div>
    <div class="tools">
      <a class="tool" href="/aristo/">
        <span class="tool-icon">&#127947;</span>
        <div>
          <div class="tool-name">Aristo</div>
          <div class="tool-desc">Gym &amp; bodyweight tracker</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
